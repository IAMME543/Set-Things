<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri App</title>
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <main class="container">

    <div class="split-layout">
      <div class="secondary-split vertical-layout hierarchy">
        <div class="search-wrapper">
          <span data-lucide="search">🔎</span>
          <input class="search-input" type="text" placeholder="Search...">
        </div>

        <button data-view="general"> <span data-lucide="settings"></span> General</button>
        <button data-view="network"><span data-lucide="globe"></span> Network</button>
        <button data-view="bluetooth"><span data-lucide="bluetooth"></span> Bluetooth</button>
        <button data-view="appearance"><span data-lucide="paintbrush"></span> Appearance</button>
        <button data-view="battery"><span data-lucide="battery"></span> Battery</button>
        <button data-view="permissions"><span data-lucide="lock"></span> Permisions</button>
        <button data-view="accessibility"><span data-lucide="PersonStanding"></span> Accessibility</button>
      </div>
      <div class="primary-split vertical-layout">
        <div class="title-bar">
          <button id="close" class="button-light"><span data-lucide="x">X</span></button>
        </div>
        <div id="view" class="main-layout"></div>
      </div>
    </div>

  </main>
  <!-- templates below -->
  <template id="general-view">
    <h1>General</h1>
    <div class="vertical-layout hierarchy">
      <button>Setting</button>
      <button>yet another thing to change</button>
    </div>
  </template>
  <template id="network-view">
    <h1>Network</h1>
    <div class="vetical-layout hierarchy">
      <div class="horizontal-setting">
        <p>Enable WIFI</p>
        <label class="switch">
          <input type="checkbox" id="enable-wifi">
          <span class="slider"></span>
        </label>
      </div>

    </div>
    <div class="vertical-layout hierarchy">
      <!-- some way to create a list of buttons programatically.... see dropdown code -->
      <button id="list-wifi">List Wifi Networks</button>
    </div>
  </template>
  <template id="bluetooth-view">
    <h1>Bluetooth</h1>
  </template>
  <template id="appearance-view">
    <h1>Appearance</h1>
  </template>
  <template id="battery-view">
    <h1>Battery</h1>
    <div class="vertical-layout hierarchy">
      <button id="powerprofile">power profile</button>
      <div class="dropdown">
        <button class="dropdown-button" data-value="Balanced"> <span data-lucide="ChevronDown">V</span><span
            class="label">Balanced</span></button>
        <div class="dropdown-menu">
          <button class="button-light" data-value="Power Saver">Power Saver</button>
          <button class="button-light" data-value="Balanced">Balanced</button>
          <button class="button-light" data-value="Performance">Performance</button>
        </div>
      </div>
      <button>blah blah</button>
      <button>blah blah</button>
      <button>blah blah</button>
    </div>
  </template>
  <template id="permissions-view">
    <h1>Permissions</h1>
  </template>
  <template id="accessibility-view">
    <h1>Accessibility</h1>
  </template>

</body>

</html>
